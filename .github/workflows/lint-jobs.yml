name: Lint and check formatting
on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
permissions:
  contents: read
  checks: write
  pull-requests: write
  id-token: write

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}-${{ inputs.environment }}"
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: "read"
      id-token: "write"
      pull-requests: "write"
      checks: "write"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 'Run Checkstyle'
        run: mvn checkstyle:check

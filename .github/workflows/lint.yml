name: Lint (staging)
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "main"
jobs:
  lint-and-check-formatting:
    name: Lint and check formatting
    uses: ./.github/workflows/lint-jobs.yml
    with:
      environment: staging
    secrets: inherit
    permissions:
      contents: "read"

spring.application.name=PassportManager
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.platform=postgres

# JPA properties for Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis Configuration
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

#bsDD Configurations
bsDD.class.searchText.url=https://api.bsdd.buildingsmart.org/api/Class/Search/v1
bsDD.classDetails.url=https://api.bsdd.buildingsmart.org/api/Class/v1
bsDD.propertiesWithDetail.url=https://api.bsdd.buildingsmart.org/api/Property/v4
bsDD.textSearch.url=https://api.bsdd.buildingsmart.org/api/TextSearch/v2

#OpenAPI Configuration
springdoc.api-docs.title=Opencirc API

spring.config.import=classpath:/DataDictionary_Mapping/bsdd.properties

company.name=opencirc

#JWT
jwt.access.token.expiration.time=100000
jwt.refresh.token.expiration.time=300000

auth.register.url=/api/auth/register
auth.login.url=/api/auth/login

secret.encryption.key=kgAG8rSojLyXZLyB4O8Zwp/+Hgb+3a95RY31fiL3vDg=

server.port=8080

spring.shell.interactive.enabled=true

#Seed
seed.passport.max-level=5
seed.passport.children-per-level=3
seed.passport.properties-count-to-select=2
seed.user.default-password=Password123!
seed.passport.templates.path=/templates/bsdd_templates.json
seed.passport.uris=https://identifier.buildingsmart.org/uri/etim/etim/10.0/class/EG000001,\

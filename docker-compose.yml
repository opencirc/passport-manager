services:
  app:
    build:
      dockerfile: Dockerfile.dev
      context: .
    ports:
      - 8080:8080
    depends_on:
      db:
       condition: service_healthy
      cache:
       condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/opencirc
      DATABASE_USER: postgres
      DATABASE_PASSWORD: opencirc
      REDIS_HOST: cache
      REDIS_PORT: 6379
      SPRING_SHELL_INTERACTIVE_ENABLED: false
    volumes:
      - ./src:/app/src
      - ./pom.xml:/app/pom.xml
      - ./target:/app/target
      - ./data:/app/data
      - maven-repo:/root/.m2
    networks:
      - spring-net
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 30s
  db:
    image: postgres:alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: opencirc
      POSTGRES_DB: opencirc
    ports:
      - 5435:5432
    container_name: postgresql
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always
    mem_limit: 768m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - spring-net

  cache:
    image: redis
    container_name: cache
    ports:
      - 6381:6379
    volumes:
      - redisdata:/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spring-net

  shell:
    profiles: ["shell"]
    build:
      dockerfile: Dockerfile.dev
      context: .
    depends_on:
      app:
        condition: service_healthy
    stdin_open: true
    tty: true
    environment:
      SPRING_SHELL_INTERACTIVE_ENABLED: true
      SPRING_MAIN_WEB_APPLICATION_TYPE: none
      DATABASE_URL: jdbc:postgresql://db:5432/opencirc
      DATABASE_USER: postgres
      DATABASE_PASSWORD: opencirc
      REDIS_HOST: cache
      REDIS_PORT: 6379
    volumes:
      - maven-repo:/root/.m2
    networks:
      - spring-net
volumes:
  db_data:
  test_db_data:
  redisdata:
  test_redisdata:
  maven-repo:

networks:
  spring-net:
